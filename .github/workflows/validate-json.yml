name: Validate JSON

on:
  pull_request:
    paths:
      - "**.json"

jobs:
  test:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: json-syntax-check
        run: |
          status=0
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $f"
              python3 -m json.tool "$f" || true
              status=1
            else
              echo "✅ Valid JSON: $f"
            fi
          done
          exit $status
